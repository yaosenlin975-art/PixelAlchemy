    <style id="theme-vars">
/* ============================================
   Noita Game UI — Brand Design Tokens
   Pixel Art Battle Game | RGB565 Palette
   ============================================ */

:root {
  /* === Primary Palette (RGB565 derived) === */
  --color-bg-deep: #0A0A14;
  --color-bg: #0F0F1A;
  --color-bg-elevated: #1A1A2E;
  --color-bg-surface: #222240;
  --color-border: #2D2D44;
  --color-border-bright: #4A4A6A;
  --color-text: #E8DCC8;
  --color-text-dim: #8A8478;
  --color-text-bright: #FFF5E6;

  /* === Material Colors (from game docs) === */
  --color-fire: #E8430A;
  --color-fire-glow: #FF6B2B;
  --color-ice: #07E8D0;
  --color-ice-glow: #5BFFF0;
  --color-poison: #7AE830;
  --color-electric: #E8E007;
  --color-blood: #E80730;
  --color-holy: #F0E8B0;
  --color-dark: #3A2868;
  --color-nature: #2E8B20;
  --color-water: #2068C0;
  --color-earth: #A06030;
  --color-air: #C0D0E0;

  /* === State Colors === */
  --state-danger: #F900;
  --state-safe: #73FF;
  --state-disabled: #514A;
  --state-warning: #E8E007;
  --state-info: #07E8D0;

  /* === HP Bar Colors === */
  --hp-full: #73FF;
  --hp-high: #7AE830;
  --hp-mid: #E8E007;
  --hp-low: #E8430A;
  --hp-critical: #F900;

  /* === Accent — Fire Orange (primary identity) === */
  --color-primary: #E8430A;
  --color-primary-bright: #FF6B2B;
  --color-primary-dim: #A03008;
  --color-primary-bg: rgba(232, 67, 10, 0.15);

  /* === Secondary — Ice Cyan (secondary identity) === */
  --color-secondary: #07E8D0;
  --color-secondary-bright: #5BFFF0;
  --color-secondary-dim: #05A890;
  --color-secondary-bg: rgba(7, 232, 208, 0.12);

  /* === Typography === */
  --font-pixel: 'Press Start 2P', 'DotGothic16', monospace;
  --font-pixel-cn: 'DotGothic16', 'ZCOOL QingKe HuangYou', 'Press Start 2P', monospace;
  --font-size-xs: 8px;
  --font-size-sm: 10px;
  --font-size-md: 12px;
  --font-size-lg: 16px;
  --font-size-xl: 20px;
  --font-size-2xl: 28px;
  --font-size-3xl: 36px;
  --line-height-tight: 1.2;
  --line-height-normal: 1.4;

  /* === Spacing (pixel-grid aligned) === */
  --space-xs: 2px;
  --space-sm: 4px;
  --space-md: 8px;
  --space-lg: 12px;
  --space-xl: 16px;
  --space-2xl: 24px;
  --space-3xl: 32px;
  --space-4xl: 48px;

  /* === Shape — Pure pixel, no rounding === */
  --radius-none: 0px;
  --radius-sm: 0px;
  --radius-md: 0px;
  --radius-lg: 0px;

  /* === Border === */
  --border-thin: 1px solid var(--color-border);
  --border-normal: 2px solid var(--color-border);
  --border-bright: 2px solid var(--color-border-bright);
  --border-accent: 2px solid var(--color-primary);

  /* === Pixel Shadow (hard offset, no blur) === */
  --shadow-pixel-sm: 2px 2px 0px var(--color-bg-deep);
  --shadow-pixel-md: 4px 4px 0px var(--color-bg-deep);
  --shadow-pixel-lg: 6px 6px 0px var(--color-bg-deep);
  --shadow-fire-sm: 2px 2px 0px var(--color-primary-dim);
  --shadow-fire-md: 4px 4px 0px var(--color-primary-dim);

  /* === Transitions (frame-step, no easing) === */
  --transition-instant: none;
  --transition-step: steps(4, end);
  --transition-fast: 80ms steps(2, end);
  --transition-normal: 160ms steps(4, end);

  /* === Z-index layers === */
  --z-base: 0;
  --z-hud: 10;
  --z-overlay: 50;
  --z-modal: 100;
  --z-tooltip: 200;
}

/* ============================================
   Typography Classes
   ============================================ */
.text-pixel {
  font-family: var(--font-pixel);
  letter-spacing: 0.5px;
  image-rendering: pixelated;
  -webkit-font-smoothing: none;
  -moz-osx-font-smoothing: never;
}

.text-pixel-cn {
  font-family: var(--font-pixel-cn);
  letter-spacing: 1px;
  image-rendering: pixelated;
  -webkit-font-smoothing: none;
}

.text-xs { font-size: var(--font-size-xs); }
.text-sm { font-size: var(--font-size-sm); }
.text-md { font-size: var(--font-size-md); }
.text-lg { font-size: var(--font-size-lg); }
.text-xl { font-size: var(--font-size-xl); }
.text-2xl { font-size: var(--font-size-2xl); }
.text-3xl { font-size: var(--font-size-3xl); }

.text-bright { color: var(--color-text-bright); }
.text-dim { color: var(--color-text-dim); }
.text-fire { color: var(--color-fire); }
.text-ice { color: var(--color-ice); }
.text-danger { color: var(--state-danger); }
.text-safe { color: var(--state-safe); }

/* ============================================
   Pixel UI Component Primitives
   ============================================ */
.pixel-btn {
  font-family: var(--font-pixel);
  font-size: var(--font-size-sm);
  color: var(--color-text-bright);
  background: var(--color-bg-elevated);
  border: var(--border-normal);
  padding: var(--space-md) var(--space-xl);
  cursor: pointer;
  box-shadow: var(--shadow-pixel-sm);
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: all var(--transition-fast);
  image-rendering: pixelated;
}

.pixel-btn:hover {
  background: var(--color-bg-surface);
  border-color: var(--color-primary);
  color: var(--color-primary-bright);
  box-shadow: var(--shadow-fire-sm);
  transform: translate(-1px, -1px);
}

.pixel-btn:active {
  transform: translate(2px, 2px);
  box-shadow: none;
}

.pixel-btn-primary {
  background: var(--color-primary);
  border-color: var(--color-primary-bright);
  color: var(--color-text-bright);
}

.pixel-btn-primary:hover {
  background: var(--color-primary-bright);
  border-color: var(--color-primary-bright);
}

.pixel-btn-secondary {
  background: var(--color-bg-elevated);
  border-color: var(--color-secondary);
  color: var(--color-secondary);
}

.pixel-btn-secondary:hover {
  background: var(--color-secondary-bg);
  color: var(--color-secondary-bright);
  border-color: var(--color-secondary-bright);
  box-shadow: 2px 2px 0px var(--color-secondary-dim);
}

.pixel-btn-sm {
  font-size: var(--font-size-xs);
  padding: var(--space-sm) var(--space-md);
}

.pixel-btn-lg {
  font-size: var(--font-size-md);
  padding: var(--space-lg) var(--space-2xl);
}

.pixel-panel {
  background: var(--color-bg-elevated);
  border: var(--border-normal);
  box-shadow: var(--shadow-pixel-md);
  padding: var(--space-xl);
  image-rendering: pixelated;
}

.pixel-panel-bright {
  border-color: var(--color-border-bright);
}

.pixel-panel-accent {
  border-color: var(--color-primary);
  box-shadow: var(--shadow-fire-sm);
}

/* HP / Progress Bar */
.pixel-bar {
  height: 8px;
  background: var(--color-bg-deep);
  border: 1px solid var(--color-border);
  image-rendering: pixelated;
  overflow: hidden;
}

.pixel-bar-fill {
  height: 100%;
  background: var(--color-primary);
  transition: width var(--transition-normal);
}

.pixel-bar-green .pixel-bar-fill { background: var(--hp-full); }
.pixel-bar-yellow .pixel-bar-fill { background: var(--hp-mid); }
.pixel-bar-red .pixel-bar-fill { background: var(--state-danger); }

/* Material color badges */
.mat-badge {
  font-family: var(--font-pixel);
  font-size: var(--font-size-xs);
  padding: var(--space-xs) var(--space-sm);
  border: 1px solid var(--color-border);
  display: inline-block;
  image-rendering: pixelated;
}

.mat-fire { color: var(--color-fire); border-color: var(--color-fire); background: rgba(232,67,10,0.15); }
.mat-ice { color: var(--color-ice); border-color: var(--color-ice); background: rgba(7,232,208,0.12); }
.mat-poison { color: var(--color-poison); border-color: var(--color-poison); background: rgba(122,232,48,0.12); }
.mat-electric { color: var(--color-electric); border-color: var(--color-electric); background: rgba(232,224,7,0.12); }
.mat-blood { color: var(--color-blood); border-color: var(--color-blood); background: rgba(232,7,48,0.15); }
.mat-holy { color: var(--color-holy); border-color: var(--color-holy); background: rgba(240,232,176,0.12); }

/* ============================================
   Animation Keyframes (frame-step)
   ============================================ */
@keyframes pulse-fire {
  0%, 100% { box-shadow: 0 0 4px var(--color-primary); }
  50% { box-shadow: 0 0 12px var(--color-primary-bright); }
}

@keyframes pulse-ice {
  0%, 100% { box-shadow: 0 0 4px var(--color-secondary); }
  50% { box-shadow: 0 0 12px var(--color-secondary-bright); }
}

@keyframes blink {
  0%, 60% { opacity: 1; }
  70%, 90% { opacity: 0; }
  100% { opacity: 1; }
}

@keyframes slide-in-left {
  from { transform: translateX(-100%); }
  to { transform: translateX(0); }
}

@keyframes slide-in-right {
  from { transform: translateX(100%); }
  to { transform: translateX(0); }
}

@keyframes fade-in {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes shake {
  0%, 100% { transform: translate(0, 0); }
  25% { transform: translate(-2px, 0); }
  75% { transform: translate(2px, 0); }
}

@keyframes float-up {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-20px); opacity: 0; }
}

/* Pixel border glow animation */
@keyframes border-glow-fire {
  0%, 100% { border-color: var(--color-primary); }
  50% { border-color: var(--color-primary-bright); }
}

@keyframes border-glow-ice {
  0%, 100% { border-color: var(--color-secondary); }
  50% { border-color: var(--color-secondary-bright); }
}

    </style>
    <style type="text/tailwindcss">
@theme inline {
  --color-primary: var(--color-primary);
  --color-secondary: var(--color-secondary);
}
</style>
    <style>
@layer base {
  body {
    background-color: var(--color-bg-deep);
    color: var(--color-text);
    font-family: var(--font-pixel);
    image-rendering: pixelated;
    -webkit-font-smoothing: none;
  }
}
</style>

  <style>

    <style>
      /* === HUD 页面专用样式 === */
      /* === 全局重置与视口 === */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1280px;
        height: 720px;
        overflow: hidden;
        background: #0A0A14;
        image-rendering: pixelated;
      }

      /* === 模拟游戏场景背景 === */
      .game-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background:
          /* 地面 */
          linear-gradient(to bottom, #0A0A14 0%, #0F0F1A 40%, #1A1A2E 65%, #222240 70%, #2A2A48 100%);
      }

      /* 平台像素方块 */
      .game-bg::before {
        content: '';
        position: absolute;
        bottom: 120px;
        left: 0;
        right: 0;
        height: 4px;
        background: #3A3A5A;
        box-shadow:
          0 4px 0 #2A2A48,
          0 8px 0 #1A1A2E;
      }

      /* 模拟平台块 */
      .game-bg::after {
        content: '';
        position: absolute;
        bottom: 260px;
        left: 200px;
        width: 160px;
        height: 8px;
        background: #3A3A5A;
        box-shadow:
          280px 0 0 #3A3A5A,
          -60px 100px 0 #3A3A5A,
          500px -40px 0 #3A3A5A;
      }

      /* 粒子效果点 */
      .particle {
        position: absolute;
        width: 2px;
        height: 2px;
        background: var(--color-fire);
        opacity: 0.6;
        animation: float-up 3s steps(6, end) infinite;
      }
      .particle:nth-child(1) { left: 15%; bottom: 30%; animation-delay: 0s; background: var(--color-fire); }
      .particle:nth-child(2) { left: 45%; bottom: 50%; animation-delay: 0.8s; background: var(--color-ice); }
      .particle:nth-child(3) { left: 70%; bottom: 40%; animation-delay: 1.5s; background: var(--color-fire-glow); }
      .particle:nth-child(4) { left: 85%; bottom: 55%; animation-delay: 0.4s; background: var(--color-poison); }
      .particle:nth-child(5) { left: 30%; bottom: 60%; animation-delay: 2.1s; background: var(--color-electric); }
      .particle:nth-child(6) { left: 55%; bottom: 35%; animation-delay: 1.2s; background: var(--color-fire); }
      .particle:nth-child(7) { left: 10%; bottom: 70%; animation-delay: 0.6s; background: var(--color-ice); }
      .particle:nth-child(8) { left: 90%; bottom: 45%; animation-delay: 1.8s; background: var(--color-fire-glow); }

      /* === HUD 层 === */
      .hud-layer {
        position: fixed;
        inset: 0;
        z-index: var(--z-hud);
        pointer-events: none;
      }
      .hud-layer > * {
        pointer-events: auto;
      }

      /* === 1. 顶部信息栏 === */
      .hud-top-bar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 48px;
        background: rgba(10, 10, 20, 0.75);
        border-bottom: 2px solid var(--color-primary);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 var(--space-2xl);
      }

      /* 玩家信息行 */
      .player-info {
        display: flex;
        align-items: center;
        gap: var(--space-md);
      }

      /* 头像框 */
      .avatar-box {
        width: 32px;
        height: 32px;
        border: 2px solid var(--color-border-bright);
        background: var(--color-bg-surface);
        display: flex;
        align-items: center;
        justify-content: center;
        image-rendering: pixelated;
        position: relative;
        overflow: hidden;
      }
      .avatar-box .avatar-inner {
        width: 100%;
        height: 100%;
        background: var(--color-primary-bg);
      }
      .avatar-box.p2 .avatar-inner {
        background: rgba(232, 7, 48, 0.15);
      }

      /* HP条 */
      .bar-group {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .hp-bar {
        width: 200px;
        height: 8px;
        background: var(--color-bg-deep);
        border: 1px solid var(--color-border);
        overflow: hidden;
        image-rendering: pixelated;
      }
      .hp-bar-fill {
        height: 100%;
        transition: width 160ms steps(4, end);
      }
      .hp-bar-fill.green { background: var(--hp-full); }
      .hp-bar-fill.red { background: var(--state-danger); }

      .shield-bar {
        width: 120px;
        height: 6px;
        background: var(--color-bg-deep);
        border: 1px solid var(--color-border);
        overflow: hidden;
        image-rendering: pixelated;
      }
      .shield-bar-fill {
        height: 100%;
        background: var(--color-secondary);
        transition: width 160ms steps(4, end);
      }

      /* 计时器 */
      .timer {
        font-family: var(--font-pixel);
        font-size: var(--font-size-xl);
        color: var(--color-primary-bright);
        text-shadow: 2px 2px 0 var(--color-primary-dim);
        letter-spacing: 2px;
      }

      /* === 2. 左下角 法术栏 === */
      .hud-spell-bar {
        position: absolute;
        bottom: var(--space-3xl);
        left: var(--space-3xl);
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: var(--space-sm);
      }
      .spell-slots {
        display: flex;
        gap: var(--space-sm);
      }
      .spell-slot {
        width: 48px;
        height: 48px;
        border: 2px solid var(--color-border);
        background: var(--color-bg-elevated);
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        image-rendering: pixelated;
      }
      .spell-slot.active {
        border-color: var(--color-primary);
        animation: border-glow-fire 0.8s steps(3, end) infinite;
      }
      .spell-slot .cooldown-num {
        font-family: var(--font-pixel);
        font-size: var(--font-size-lg);
        color: var(--color-text-dim);
      }

      /* CSS 像素火球图标 */
      .fireball-icon {
        width: 24px;
        height: 24px;
        position: relative;
      }
      .fireball-icon span {
        position: absolute;
        background: var(--color-fire);
      }
      /* 3x3 像素方块拼火球 */
      .fireball-icon .fb-1 { width: 4px; height: 4px; top: 0; left: 8px; background: var(--color-fire-glow); }
      .fireball-icon .fb-2 { width: 8px; height: 4px; top: 4px; left: 4px; background: var(--color-fire); }
      .fireball-icon .fb-3 { width: 12px; height: 4px; top: 8px; left: 2px; background: var(--color-fire); }
      .fireball-icon .fb-4 { width: 8px; height: 4px; top: 12px; left: 4px; background: var(--color-primary-dim); }
      .fireball-icon .fb-5 { width: 4px; height: 4px; top: 12px; left: 12px; background: var(--color-fire-glow); }
      .fireball-icon .fb-6 { width: 4px; height: 4px; top: 16px; left: 8px; background: var(--color-primary-dim); }
      .fireball-icon .fb-7 { width: 4px; height: 4px; top: 8px; left: 14px; background: var(--color-fire-glow); }

      .spell-name {
        font-family: var(--font-pixel-cn);
        font-size: var(--font-size-xs);
        color: var(--color-fire);
        text-align: center;
        width: 48px;
      }

      /* === 3. 右下角 小地图 === */
      .hud-minimap {
        position: absolute;
        bottom: var(--space-3xl);
        right: var(--space-3xl);
        width: 120px;
        height: 120px;
        border: 2px solid var(--color-border);
        background: var(--color-bg-deep);
        image-rendering: pixelated;
      }
      .minimap-label {
        position: absolute;
        top: var(--space-xs);
        left: var(--space-sm);
        font-family: var(--font-pixel);
        font-size: var(--font-size-xs);
        color: var(--color-text-dim);
      }
      /* 小地图像素点 */
      .minimap-dot {
        position: absolute;
        width: 4px;
        height: 4px;
      }
      .minimap-dot.p1 {
        background: var(--color-primary-bright);
        bottom: 30px;
        left: 35px;
      }
      .minimap-dot.p2 {
        background: var(--state-danger);
        bottom: 60px;
        right: 30px;
      }
      .minimap-obstacle {
        position: absolute;
        width: 6px;
        height: 6px;
        background: var(--color-border);
      }
      .minimap-obstacle:nth-child(3) { bottom: 20px; left: 60px; }
      .minimap-obstacle:nth-child(4) { bottom: 50px; left: 20px; width: 10px; }
      .minimap-obstacle:nth-child(5) { bottom: 80px; left: 80px; width: 8px; height: 4px; }
      .minimap-obstacle:nth-child(6) { top: 30px; left: 40px; }
      .minimap-obstacle:nth-child(7) { top: 50px; right: 15px; width: 4px; height: 10px; }

      /* === 4. 右上角下方 击杀信息 === */
      .hud-kill-feed {
        position: absolute;
        top: 60px;
        right: var(--space-xl);
        display: flex;
        flex-direction: column;
        gap: var(--space-sm);
        width: 180px;
      }
      .kill-msg {
        font-family: var(--font-pixel-cn);
        font-size: var(--font-size-xs);
        color: var(--color-text);
        background: rgba(10, 10, 20, 0.6);
        padding: var(--space-xs) var(--space-sm);
        border: 1px solid var(--color-border);
        display: flex;
        align-items: center;
        gap: var(--space-xs);
        white-space: nowrap;
        image-rendering: pixelated;
      }
      .kill-msg.oldest { opacity: 0.5; }

      /* === 5. 底部中央 键位提示 === */
      .hud-controls {
        position: absolute;
        bottom: var(--space-sm);
        left: 50%;
        transform: translateX(-50%);
        font-family: var(--font-pixel-cn);
        font-size: var(--font-size-xs);
        color: var(--color-text-dim);
        white-space: nowrap;
      }
      .hud-controls a {
        color: var(--color-text-dim);
        text-decoration: none;
        cursor: pointer;
      }
      .hud-controls a:hover {
        color: var(--color-text);
      }

      /* === 6. 左上角 材料拾取提示 === */
      .hud-pickup {
        position: absolute;
        top: 60px;
        left: var(--space-xl);
        background: rgba(10, 10, 20, 0.8);
        border: 2px solid var(--color-fire);
        padding: var(--space-sm) var(--space-md);
        font-family: var(--font-pixel-cn);
        font-size: var(--font-size-sm);
        color: var(--color-fire);
        box-shadow: var(--shadow-fire-sm);
        image-rendering: pixelated;
        animation: pickup-float 3s steps(8, end) forwards;
      }
      @keyframes pickup-float {
        0%, 60% { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(-24px); opacity: 0; }
      }
    </style>
</body>
</html>
