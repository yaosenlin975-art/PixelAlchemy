<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081116"/>
      <stop offset="1" stop-color="#12251f"/>
    </linearGradient>
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowGreen" markerWidth="18" markerHeight="18" refX="14" refY="9" orient="auto">
      <path d="M2,2 L16,9 L2,16 Z" fill="#5cff78"/>
    </marker>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect x="70" y="62" width="1780" height="956" rx="28" fill="#0d1719" stroke="#24463b" stroke-width="2"/>

  <text x="120" y="142" fill="#f3fff7" font-size="58" font-family="Arial, Microsoft YaHei, sans-serif" font-weight="700">Active Pixels / 活跃像素</text>
  <text x="120" y="194" fill="#a9c8b4" font-size="28" font-family="Arial, Microsoft YaHei, sans-serif">Only pixels near movement, heat, lifetime or material changes are updated. 只更新发生变化附近的像素。</text>

