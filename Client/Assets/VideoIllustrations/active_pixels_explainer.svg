  <g transform="translate(1160 300)">
    <rect x="0" y="0" width="610" height="170" rx="16" fill="#14241f" stroke="#5cff78" stroke-width="2"/>
    <text x="30" y="55" fill="#5cff78" font-size="34" font-family="Arial, Microsoft YaHei, sans-serif" font-weight="700">Idea / 核心思想</text>
    <text x="30" y="108" fill="#f3fff7" font-size="30" font-family="Arial, Microsoft YaHei, sans-serif">Static areas sleep</text>
    <text x="30" y="150" fill="#a9c8b4" font-size="28" font-family="Arial, Microsoft YaHei, sans-serif">静止区域不再重复计算</text>
  </g>
  <g transform="translate(1160 520)">
    <rect x="0" y="0" width="610" height="230" rx="16" fill="#14241f" stroke="#35a7ff" stroke-width="2"/>
    <text x="30" y="55" fill="#35a7ff" font-size="34" font-family="Arial, Microsoft YaHei, sans-serif" font-weight="700">Updated when / 何时激活</text>
    <text x="30" y="108" fill="#f3fff7" font-size="29" font-family="Arial, Microsoft YaHei, sans-serif">Move / Exchange / Burn</text>
    <text x="30" y="153" fill="#f3fff7" font-size="29" font-family="Arial, Microsoft YaHei, sans-serif">Temperature / Lifetime</text>
    <text x="30" y="198" fill="#a9c8b4" font-size="27" font-family="Arial, Microsoft YaHei, sans-serif">移动、交换、燃烧、温度、生命周期变化</text>
  </g>
  <text x="1160" y="835" fill="#5cff78" font-size="32" font-family="Arial, Microsoft YaHei, sans-serif" font-weight="700">Best for sparse change. Fast in this demo. / 变化稀疏时最快，本 Demo 表现最好。</text>
</svg>
