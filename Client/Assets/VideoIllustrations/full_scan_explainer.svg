<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1018"/>
      <stop offset="1" stop-color="#171f2b"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff4d4d" stop-opacity="0.05"/>
      <stop offset="0.5" stop-color="#ffcc33" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ff4d4d" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowHot" markerWidth="18" markerHeight="18" refX="14" refY="9" orient="auto">
      <path d="M2,2 L16,9 L2,16 Z" fill="#ffcc33"/>
    </marker>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect x="70" y="62" width="1780" height="956" rx="28" fill="#0f1621" stroke="#263348" stroke-width="2"/>

  <text x="120" y="142" fill="#f3f8ff" font-size="58" font-family="Arial, Microsoft YaHei, sans-serif" font-weight="700">Full Scan / 全图扫描</text>
  <text x="120" y="194" fill="#aab8cc" font-size="28" font-family="Arial, Microsoft YaHei, sans-serif">Every simulation step checks every cell, whether it changed or not. 每个模拟步都检查整张 PixelGrid。</text>

